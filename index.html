<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantlic — Your AI agent for money on Mantle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--border:rgba(255,255,255,.06);--text:#fff;--dim:rgba(255,255,255,.45);--accent:#FF6B9D;--accent-dim:rgba(255,107,157,.15);--radius:12px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100svh}
a{color:var(--accent);text-decoration:none}
a:hover{opacity:.8}
.sidebar{width:260px;min-height:100svh;border-right:1px solid var(--border);padding:1.5rem;display:flex;flex-direction:column;background:var(--surface);position:fixed;left:0;top:0}
.sidebar .logo{font-weight:600;font-size:.9rem;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;margin-bottom:1.5rem}
.sidebar .logo .icon{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:.8rem}
.sidebar .logo span{color:var(--dim);font-weight:400}
.sidebar .badge{font-size:.65rem;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--border);padding:.35rem .6rem;border-radius:6px;margin-bottom:2rem;display:flex;align-items:center;gap:5px}
.sidebar .badge .dot{width:5px;height:5px;background:#4ade80;border-radius:50%}
.sidebar nav{flex:1}
.sidebar nav a{display:flex;align-items:center;gap:8px;padding:.5rem .7rem;border-radius:8px;font-size:.8rem;color:var(--dim);margin-bottom:2px;transition:.15s}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.04);color:var(--text)}
.sidebar nav a svg{width:14px;height:14px;flex-shrink:0}
.wallet-section{border-top:1px solid var(--border);padding-top:1rem;margin-top:auto}
.wallet-section .addr{display:flex;align-items:center;gap:6px;padding:.5rem .7rem;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:6px;font-size:.7rem;color:var(--dim);font-family:var(--mono);cursor:pointer;transition:.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wallet-section .addr:hover{background:rgba(255,255,255,.06)}
.wallet-section .addr .dot{width:4px;height:4px;border-radius:50%;background:var(--dim);flex-shrink:0}
.wallet-section .addr .dot.live{background:#4ade80}
.wallet-section .btn-group{display:flex;gap:4px}
.wallet-section .btn-group button{flex:1;font-family:inherit;font-size:.7rem;padding:.45rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:.15s;font-weight:500}
.wallet-section .btn-group button:hover{border-color:var(--accent);color:var(--text)}
.wallet-section .btn-group button.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.main{margin-left:260px;flex:1;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.8rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar .page-title{font-size:.85rem;font-weight:500}
.topbar .page-title span{color:var(--dim)}
.topbar .right{display:flex;align-items:center;gap:12px}
.topbar .balance-pill{background:var(--surface);border:1px solid var(--border);padding:.35rem .8rem;border-radius:20px;font-size:.75rem;font-weight:500}
.topbar .balance-pill .mnt{color:var(--accent)}
.topbar .network-pill{font-size:.65rem;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--border);padding:.3rem .65rem;border-radius:20px}
.topbar .network-pill .d{display:inline-block;width:4px;height:4px;background:#4ade80;border-radius:50%;margin-right:5px}
.chat-area{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chat-container{max-width:640px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem}
.welcome .icon{width:48px;height:48px;background:var(--accent-dim);border:1px solid rgba(255,107,157,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--accent);margin-bottom:1rem}
.welcome h2{font-size:1.1rem;font-weight:600;margin-bottom:.3rem}
.welcome p{font-size:.8rem;color:var(--dim);max-width:320px;line-height:1.5;margin-bottom:1.5rem}
.welcome .suggestions{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.welcome .suggestions span{padding:.35rem .75rem;border:1px solid var(--border);border-radius:20px;font-size:.7rem;color:var(--dim);cursor:pointer;transition:.15s}
.welcome .suggestions span:hover{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.msgs{flex:1;overflow-y:auto;padding-bottom:1rem}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{margin-bottom:12px;animation:fi .25s both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .b{display:inline-block;padding:.6rem .9rem;font-size:.82rem;line-height:1.55;max-width:85%;border-radius:var(--radius)}
.msg.bot{text-align:left}
.msg.bot .b{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.user{text-align:right}
.msg.user .b{background:var(--accent);color:#000;border-bottom-right-radius:4px;font-weight:500}
.msg .resp{margin-top:6px;padding:.6rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.75rem;display:inline-block;min-width:200px}
.msg .resp .rw{display:flex;justify-content:space-between;padding:3px 0}
.msg .resp .k{color:var(--dim)}
.msg .resp .v{color:var(--text)}
.msg .resp .v.ok{color:#4ade80}
.typing{color:var(--dim);font-style:italic;font-size:.75rem}
.input-bar{padding:1rem 0;border-top:1px solid var(--border);display:flex;gap:8px}
.input-bar input{flex:1;background:var(--surface);border:1px solid var(--border);padding:.7rem .9rem;border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:.82rem;outline:none;transition:.15s}
.input-bar input:focus{border-color:var(--accent)}
.input-bar input::placeholder{color:var(--dim)}
.input-bar button{width:40px;height:40px;border-radius:var(--radius);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.input-bar button:hover{opacity:.8}
.input-bar button svg{width:16px;height:16px;stroke:#000;stroke-width:2;fill:none}
.connect-prompt{text-align:center;padding:3rem 1rem}
.connect-prompt .big-icon{font-size:2.5rem;margin-bottom:.8rem;color:var(--accent)}
.connect-prompt h3{font-size:.95rem;font-weight:500;margin-bottom:.3rem}
.connect-prompt p{font-size:.78rem;color:var(--dim)}
@media(max-width:768px){
.sidebar{display:none}
.main{margin-left:0}
.topbar{padding:.7rem 1rem}
.chat-area{padding:1rem}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="icon">M</div>
    Mantlic <span>beta</span>
  </div>
  <div class="badge"><span class="dot"></span> Mantle Sepolia</div>
  <nav>
    <a href="#" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Chat</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> History</a>
  </nav>
  <div class="wallet-section">
    <div class="addr" onclick="promptAddress()" id="walletDisplay">
      <span class="dot" id="walletDot"></span>
      <span id="walletLabel">No wallet</span>
    </div>
    <div class="btn-group">
      <button onclick="promptAddress()">[+] Address</button>
      <button class="primary" onclick="connectWallet()">Connect</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Chat <span>/ new</span></div>
    <div class="right">
      <div class="balance-pill" id="topBalance">0 <span class="mnt">MNT</span></div>
      <div class="network-pill"><span class="d" id="pillDot"></span> <span id="pillLabel">Mantle Sepolia</span></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-container">
      <div class="msgs" id="msgs"></div>
      <div class="welcome" id="welcome">
        <div class="icon">&#9670;</div>
        <h2>Your wallet on Mantle</h2>
        <p>Enter an address or connect a wallet to start chatting with your money.</p>
        <div class="suggestions">
          <span onclick="fill('balance')">balance</span>
          <span onclick="fill('tokens')">tokens</span>
          <span onclick="fill('status')">status</span>
          <span onclick="fill('help')">help</span>
        </div>
      </div>
      <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type a command..." autocomplete="off">
        <button onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script>
// === Config ===
const MANTLE = {
  rpc: 'https://rpc.sepolia.mantle.xyz', altRpc: 'https://0x7533.sepolia.mantle.xyz',
  chainId: 50003,
  hexChainId: '0xc353',
  explorer: 'https://explorer.sepolia.mantle.xyz'
};
const TOKENS = {
  USDC: { addr: '0xF0e6E6c9E4Ea1870D1c7D0d5aA2c923e78bB7d9', decimals: 6 },
  WETH: { addr: '0x8D4d0e3D9dE6c1E6d9F1B2E5c6F7A8B9C0D1E2F', decimals: 18 },
  wMNT: { addr: '0x8A6C3B9E4D0F1E5C7A9B8D2E6F4C0A1B3D5E7F9', decimals: 18 }
};

// === State ===
let address = null;
let nativeBal = 0;

// === DOM ===
const $ = id => document.getElementById(id);
const msgs = $('msgs');
const welcome = $('welcome');
const wi = $('chatInput');
const wl = $('walletLabel');
const wd = $('walletDot');
const tb = $('topBalance');
const pl = $('pillLabel');

// === RPC ===
async function rpc(method, params) {
  const res = await fetch(MANTLE.rpc, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({jsonrpc:'2.0',id:1,method,params})
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.result;
}
function hex(x) { return parseInt(x.startsWith('0x')?x.slice(2):x,16); }
function wei2eth(w) {
  const v = BigInt(w), e = v / 1000000000000000000n, f = v % 1000000000000000000n;
  return Number(e + '.' + String(f).padStart(18,'0').slice(0,6));
}

// === Wallet ===
async function refreshBal() {
  if (!address) return;
  try {
    const b = await rpc('eth_getBalance',[address,'latest']);
    nativeBal = wei2eth(b);
    tb.innerHTML = nativeBal.toFixed(2) + ' <span class="mnt">MNT</span>';
  } catch(e) {}
}

function setWallet(addr) {
  address = addr;
  wl.textContent = addr.slice(0,6) + '...' + addr.slice(-4);
  wd.className = 'dot live';
  welcome.style.display = 'none';
  refreshBal();
  addBot('Connected to <strong>' + addr.slice(0,6) + '...' + addr.slice(-4) + '</strong> on Mantle Sepolia. Try <strong>balance</strong> or ask me anything.');
}

function promptAddress() {
  const a = prompt('Enter Mantle address (0x...):');
  if (a && a.startsWith('0x') && a.length === 42) setWallet(a);
  else if (a) addBot('Invalid address. Must be 0x... (42 chars).');
}

function connectWallet() {
  var ps = [];
  if (window.ethereum) {
    var all = window.ethereum.providers && window.ethereum.providers.length ? window.ethereum.providers : [window.ethereum];
    ps = all.filter(function(p) { return !p.isKaspa; });
  }
  if (ps.length === 0) { addBot("No EVM wallet. Use [+] Address."); return; }
  var mm = ps.find(function(p) { return p.isMetaMask; });
  var provider = mm || ps[0];
  (async function() {
    try {
      var accs = await provider.request({method: "eth_requestAccounts"});
      if (!accs || !accs.length) { addBot("No accounts."); return; }
      try {
        await provider.request({method: "wallet_switchEthereumChain", params: [{chainId: MANTLE.hexChainId}]});
      } catch(e) {
        if (e.code === 4902) {
          try {
            await provider.request({method: "wallet_addEthereumChain", params: [{
              chainId: MANTLE.hexChainId,
              chainName: "Mantle Sepolia Testnet",
              rpcUrls: ["https://0x7533.sepolia.mantle.xyz"],
              nativeCurrency: {name: "MNT", symbol: "MNT", decimals: 18},
              blockExplorerUrls: [MANTLE.explorer]
            }]});
          } catch(e2) {}
        }
      }
      // ALWAYS set wallet after getting accounts, regardless of chain switch result
      setWallet(accs[0]);
    } catch(e) { addBot("Failed: " + e.message); }
  })();
}

// === Chat ===
function addBot(h) {
  const d = document.createElement('div'); d.className = 'msg bot';
  d.innerHTML = '<div class="b">'+h+'</div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function addUser(t) {
  const d = document.createElement('div'); d.className = 'msg user';
  d.innerHTML = '<div class="b">'+t.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function showTyp() {
  const d = document.createElement('div'); d.className = 'msg bot'; d.id='_ty';
  d.innerHTML = '<div class="b"><span class="typing">thinking...</span></div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function rmTyp() { const e = document.getElementById('_ty'); if(e)e.remove(); }
function fill(c) { wi.value=c; wi.focus(); }

async function getGas() {
  const g = await rpc('eth_gasPrice',[]);
  return Number((BigInt(g)*100n/1000000000n))/100;
}
async function getBlock() { return hex(await rpc('eth_blockNumber',[])); }

function balAddr() { return '0x70a08231'+address.slice(2).toLowerCase().padStart(64,'0'); }

async function processCmd(cmd) {
  const c = cmd.toLowerCase().trim();
  if (!c) return;
  if (c==='clear') { msgs.innerHTML=''; welcome.style.display='flex'; return; }
  if (c==='balance'||c==='bal') {
    if (!address) { addBot('Set an address first via [+] Address or Connect.'); return; }
    await refreshBal();
    addBot('**'+nativeBal.toFixed(4)+' MNT**<br><small style="color:var(--dim)">~$'+(nativeBal*1.24).toFixed(2)+' USD</small>');
    return;
  }
  if (c==='tokens'||c==='portfolio'||c==='all') {
    if (!address) { addBot('Set an address first.'); return; }
    const mnt = await rpc('eth_getBalance',[address,'latest']).then(wei2eth);
    let html = '<div class="resp"><div class="rw"><span class="k">MNT</span><span class="v">'+mnt.toFixed(4)+'</span></div>';
    for (const [sym,t] of Object.entries(TOKENS)) {
      try {
        const d = await rpc('eth_call',[{to:t.addr,data:balAddr()},'latest']);
        const v = BigInt(d);
        if (v>0n) {
          const dv = 10n**BigInt(t.decimals);
          const w = v/dv, f = v%dv;
          html += '<div class="rw"><span class="k">'+sym+'</span><span class="v">'+Number(w+'.'+String(f).padStart(t.decimals,'0').slice(0,4))+'</span></div>';
        }
      } catch(e) {}
    }
    html += '</div>';
    addBot('Portfolio:'+html);
    return;
  }
  if (c.startsWith('send ')||c.startsWith('transfer ')) {
    if (!address) { addBot('Set an address first.'); return; }
    const m = cmd.match(/^(send|transfer)\s+([\d.]+)\s+(?:to|->)?\s*(0x[a-fA-F0-9]{40})/);
    if (!m) { addBot('Usage: send <amount> to <address>'); return; }
    const amt = parseFloat(m[2]), to = m[3];
    if (isNaN(amt)||amt<=0) { addBot('Invalid amount.'); return; }
    // Find wallet provider for signing
    let p = window.ethereum;
    if (window.ethereum&&window.ethereum.providers) {
      const mm = window.ethereum.providers.find(x=>x.isMetaMask);
      if (mm) p=mm;
    }
    if (!p||!p.request) { addBot('No wallet for signing. Use Connect Wallet first.'); return; }
    addBot('Proposing: Send **'+amt+' MNT** to '+to.slice(0,6)+'...'+to.slice(-4)+'<br><small style="color:var(--dim)">Confirm in MetaMask...</small>');
    try {
      const wei = '0x'+BigInt(Math.floor(amt*1e18)).toString(16);
      const [nonce,gp] = await Promise.all([
        rpc('eth_getTransactionCount',[address,'pending']),
        rpc('eth_gasPrice',[])
      ]);
      const tx = {from:address,to:to,value:wei,gasPrice:gp,gas:'0x5208',nonce};
      const h = await p.request({method:'eth_sendTransaction',params:[tx]});
      addBot('Sent! Tx: **'+h.slice(0,10)+'...'+h.slice(-8)+'**<br><small style="color:var(--dim)">View on <a href="'+MANTLE.explorer+'/tx/'+h+'" target="_blank" style="color:var(--accent)">explorer</a></small>');
    } catch(e) { addBot('Failed: '+e.message); }
    return;
  }
  if (c==='status'||c==='net') {
    if (!address) { addBot('Set an address first.'); return; }
    const [gas,block] = await Promise.all([getGas(),getBlock()]);
    addBot('<div class="resp"><div class="rw"><span class="k">Network</span><span class="v">Mantle Sepolia</span></div><div class="rw"><span class="k">Block</span><span class="v">#'+block.toLocaleString()+'</span></div><div class="rw"><span class="k">Gas</span><span class="v">'+gas.toFixed(0)+' Gwei</span></div><div class="rw"><span class="k">Wallet</span><span class="v">'+address.slice(0,6)+'...'+address.slice(-4)+'</span></div><div class="rw"><span class="k">MNT</span><span class="v">'+nativeBal.toFixed(4)+'</span></div><div class="rw"><span class="k">RPC</span><span class="v ok">Connected</span></div></div>');
    return;
  }
  if (c==='history'||c==='txs'||c==='recent') {
    if (!address) { addBot('Set an address first.'); return; }
    addBot('View transactions:<br><a href="'+MANTLE.explorer+'/address/'+address+'#tokentxns" target="_blank" style="color:var(--accent)">'+MANTLE.explorer+'/address/'+address.slice(0,10)+'...</a>');
    return;
  }
  if (c==='help'||c==='?') {
    addBot('<div class="resp"><div class="rw"><span class="k">balance</span><span class="v">MNT balance</span></div><div class="rw"><span class="k">tokens</span><span class="v">Portfolio</span></div><div class="rw"><span class="k">send</span><span class="v">Send MNT</span></div><div class="rw"><span class="k">status</span><span class="v">Network info</span></div><div class="rw"><span class="k">history</span><span class="v">Explorer link</span></div><div class="rw"><span class="k">clear</span><span class="v">Clear chat</span></div><div class="rw"><span class="k">help</span><span class="v">This menu</span></div></div>');
    return;
  }
  // Unknown — Qwen
  if (window.QWEN) {
    try {
      const [b,g,bl] = await Promise.all([
        rpc('eth_getBalance',[address||'0x','latest']).then(wei2eth).catch(()=>'--'),
        getGas().catch(()=>'--'),
        getBlock().catch(()=>'--')
      ]);
      const ctx = 'MNT balance '+b+', gas '+g+' Gwei, block #'+bl+(address?', wallet '+address.slice(0,6)+'...'+address.slice(-4):'');
      const ai = await window.QWEN.ask([
        {role:'system',content:'You are Mantlic, an AI finance agent on Mantle blockchain. Answer concisely (max 80 words). Direct, no fluff. Context: '+ctx},
        {role:'user',content:cmd}
      ]);
      if (ai) { addBot(ai); return; }
    } catch(e) {}
  }
  addBot('Unknown. Type <strong>help</strong> for commands.');
}

async function sendMsg() {
  const t = wi.value.trim();
  if (!t) return;
  addUser(t); wi.value=''; showTyp();
  try { await processCmd(t); } catch(e) { addBot('Error: '+e.message); }
  rmTyp();
}

wi.addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
setInterval(()=>{if(address)refreshBal()},30000);

// Initial chain status
(async()=>{
  try {
    const [b,g] = await Promise.all([getBlock(),getGas()]);
    pl.textContent = 'Mantle Sepolia - #'+b.toLocaleString()+' - '+g.toFixed(0)+' Gwei';
  } catch(e) { pl.textContent = 'Mantle Sepolia'; }
})();

// Qwen AI
window.QWEN = {
  _proxies: ['https://api.allorigins.win/raw?url=','https://corsproxy.io/?'],
  _proxyIdx: 0,
  async ask(msgs) {
    const payload = {model:'qwen3.5-omni-plus',messages:msgs,max_tokens:200,temperature:0.7};
    const url='https://ws-zk1ia72jgwez6qgp.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1/chat/completions';
    const key='sk-ws-H.IIEDIH.kx4n.MEUCIFT9ZIwCA-4AZQexb2TFfFI58svOova0GHtHa7aWQZkpAiEAmPxci17zOBvHsYkeZkXIdRfy2K1Gt3AYhDSdqyT2eLs';
    for(let a=0;a<this._proxies.length;a++){
      const i=(this._proxyIdx+a)%this._proxies.length;
      try{
        const r=await fetch(this._proxies[i]+encodeURIComponent(url),{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
          body:JSON.stringify(payload),signal:AbortSignal.timeout(10000)
        });
        if(!r.ok)continue;
        const d=await r.json();this._proxyIdx=i;
        return d.choices?.[0]?.message?.content||'';
      }catch(e){continue;}
    }
    return null;
  }
};
console.log('Mantlic ready');
